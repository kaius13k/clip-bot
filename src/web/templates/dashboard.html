<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ agent_name }} - AI Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-running { background-color: #10b981; }
        .status-stopped { background-color: #ef4444; }
        .task-card { transition: all 0.3s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-2xl font-bold text-gray-900">{{ agent_name }}</h1>
                        <p class="text-sm text-gray-500">Autonomous AI Agent Dashboard</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="agent-status" class="flex items-center">
                        <span class="status-indicator status-stopped" id="status-indicator"></span>
                        <span id="status-text" class="text-sm font-medium">Stopped</span>
                    </div>
                    <button id="start-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm font-medium">
                        Start Agent
                    </button>
                    <button id="stop-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm font-medium hidden">
                        Stop Agent
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Status Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white overflow-hidden shadow-lg rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <div class="w-8 h-8 bg-blue-500 rounded-md flex items-center justify-center">
                                <span class="text-white text-sm font-bold">T</span>
                            </div>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Total Tasks</dt>
                                <dd class="text-lg font-medium text-gray-900" id="total-tasks">0</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white overflow-hidden shadow-lg rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <div class="w-8 h-8 bg-yellow-500 rounded-md flex items-center justify-center">
                                <span class="text-white text-sm font-bold">A</span>
                            </div>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Active Tasks</dt>
                                <dd class="text-lg font-medium text-gray-900" id="active-tasks">0</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white overflow-hidden shadow-lg rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <div class="w-8 h-8 bg-green-500 rounded-md flex items-center justify-center">
                                <span class="text-white text-sm font-bold">C</span>
                            </div>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Completed</dt>
                                <dd class="text-lg font-medium text-gray-900" id="completed-tasks">0</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white overflow-hidden shadow-lg rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <div class="w-8 h-8 bg-purple-500 rounded-md flex items-center justify-center">
                                <span class="text-white text-sm font-bold">U</span>
                            </div>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Uptime</dt>
                                <dd class="text-lg font-medium text-gray-900" id="uptime">00:00:00</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Task Creation -->
            <div class="bg-white shadow-lg rounded-lg p-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Create New Task</h3>
                <form id="task-form">
                    <div class="mb-4">
                        <label for="task-description" class="block text-sm font-medium text-gray-700 mb-2">
                            Task Description
                        </label>
                        <textarea 
                            id="task-description" 
                            rows="3" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Describe what you want the agent to do..."
                            required
                        ></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="task-priority" class="block text-sm font-medium text-gray-700 mb-2">
                            Priority
                        </label>
                        <select 
                            id="task-priority" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                            <option value="1">Low (1)</option>
                            <option value="5" selected>Medium (5)</option>
                            <option value="10">High (10)</option>
                        </select>
                    </div>
                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md font-medium"
                    >
                        Add Task
                    </button>
                </form>
            </div>

            <!-- Recent Tasks -->
            <div class="lg:col-span-2 bg-white shadow-lg rounded-lg p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Recent Tasks</h3>
                    <button 
                        id="refresh-tasks" 
                        class="text-blue-600 hover:text-blue-800 text-sm font-medium"
                    >
                        Refresh
                    </button>
                </div>
                <div id="tasks-container" class="space-y-4">
                    <div class="text-center text-gray-500 py-8">
                        No tasks yet. Create a task to get started!
                    </div>
                </div>
            </div>
        </div>

        <!-- Memory Statistics -->
        <div class="mt-8 bg-white shadow-lg rounded-lg p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Memory Statistics</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <canvas id="tasks-chart" width="400" height="200"></canvas>
                </div>
                <div>
                    <canvas id="execution-chart" width="400" height="200"></canvas>
                </div>
                <div>
                    <canvas id="patterns-chart" width="400" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection for real-time updates
        let ws;
        let startTime = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onmessage = function(event) {
                const message = JSON.parse(event.data);
                if (message.type === 'status') {
                    updateStatus(message.data);
                } else if (message.type === 'task_update') {
                    loadTasks();
                }
            };
            
            ws.onclose = function() {
                // Reconnect after 5 seconds
                setTimeout(connectWebSocket, 5000);
            };
        }

        function updateStatus(status) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            if (status.is_running) {
                indicator.className = 'status-indicator status-running';
                statusText.textContent = 'Running';
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                if (!startTime) startTime = Date.now();
            } else {
                indicator.className = 'status-indicator status-stopped';
                statusText.textContent = 'Stopped';
                startBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                startTime = null;
            }
            
            document.getElementById('total-tasks').textContent = status.total_tasks || 0;
            document.getElementById('active-tasks').textContent = status.active_tasks || 0;
        }

        function updateUptime() {
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const hours = Math.floor(elapsed / 3600);
                const minutes = Math.floor((elapsed % 3600) / 60);
                const seconds = elapsed % 60;
                
                document.getElementById('uptime').textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            } else {
                document.getElementById('uptime').textContent = '00:00:00';
            }
        }

        async function startAgent() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                if (response.ok) {
                    startTime = Date.now();
                    showNotification('Agent started successfully', 'success');
                } else {
                    const error = await response.json();
                    showNotification(`Failed to start agent: ${error.detail}`, 'error');
                }
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        async function stopAgent() {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                if (response.ok) {
                    startTime = null;
                    showNotification('Agent stopped successfully', 'success');
                } else {
                    const error = await response.json();
                    showNotification(`Failed to stop agent: ${error.detail}`, 'error');
                }
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        async function createTask(description, priority) {
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, priority: parseInt(priority) })
                });
                
                if (response.ok) {
                    showNotification('Task created successfully', 'success');
                    loadTasks();
                    document.getElementById('task-form').reset();
                } else {
                    const error = await response.json();
                    showNotification(`Failed to create task: ${error.detail}`, 'error');
                }
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                if (response.ok) {
                    const tasks = await response.json();
                    displayTasks(tasks);
                    updateTaskCounts(tasks);
                }
            } catch (error) {
                console.error('Failed to load tasks:', error);
            }
        }

        function displayTasks(tasks) {
            const container = document.getElementById('tasks-container');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">No tasks yet. Create a task to get started!</div>';
                return;
            }
            
            container.innerHTML = tasks.slice(0, 10).map(task => `
                <div class="task-card border border-gray-200 rounded-lg p-4">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center mb-2">
                                <span class="text-sm font-medium text-gray-900">${task.description}</span>
                                <span class="ml-2 px-2 py-1 text-xs rounded-full ${getStatusColor(task.status)}">${task.status}</span>
                            </div>
                            <div class="text-xs text-gray-500">
                                Priority: ${task.priority} | Created: ${new Date(task.created_at).toLocaleString()}
                            </div>
                            ${task.error ? `<div class="text-xs text-red-600 mt-1">Error: ${task.error}</div>` : ''}
                        </div>
                        ${task.status === 'pending' || task.status === 'in_progress' ? `
                            <button onclick="cancelTask('${task.id}')" class="text-red-600 hover:text-red-800 text-xs">Cancel</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'completed': return 'bg-green-100 text-green-800';
                case 'in_progress': return 'bg-yellow-100 text-yellow-800';
                case 'failed': return 'bg-red-100 text-red-800';
                case 'cancelled': return 'bg-gray-100 text-gray-800';
                default: return 'bg-blue-100 text-blue-800';
            }
        }

        function updateTaskCounts(tasks) {
            const completed = tasks.filter(t => t.status === 'completed').length;
            document.getElementById('completed-tasks').textContent = completed;
        }

        async function cancelTask(taskId) {
            try {
                const response = await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
                if (response.ok) {
                    showNotification('Task cancelled', 'success');
                    loadTasks();
                }
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        function showNotification(message, type) {
            // Simple notification - in production, use a proper notification library
            const color = type === 'success' ? 'green' : 'red';
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 bg-${color}-500 text-white px-4 py-2 rounded-md shadow-lg z-50`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 3000);
        }

        // Event listeners
        document.getElementById('start-btn').addEventListener('click', startAgent);
        document.getElementById('stop-btn').addEventListener('click', stopAgent);
        document.getElementById('refresh-tasks').addEventListener('click', loadTasks);
        
        document.getElementById('task-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const description = document.getElementById('task-description').value;
            const priority = document.getElementById('task-priority').value;
            createTask(description, priority);
        });

        // Initialize
        connectWebSocket();
        loadTasks();
        setInterval(updateUptime, 1000);
        
        // Load initial status
        fetch('/api/status').then(response => {
            if (response.ok) {
                return response.json();
            }
        }).then(status => {
            if (status) updateStatus(status);
        }).catch(() => {
            // Agent not started yet
        });
    </script>
</body>
</html>
