agent:
  name: "AutoAgent"
  model: "gpt-4"
  max_iterations: 50
  timeout_seconds: 300
  memory_limit: 1000
  
api_keys:
  openai: "your-openai-api-key"
  anthropic: "your-anthropic-api-key"
  
database:
  url: "sqlite:///agent_memory.db"
  
web_interface:
  host: "0.0.0.0"
  port: 8000
  
logging:
  level: "INFO"
  file: "agent.log"
  
autonomous_mode:
  enabled: true
  check_interval_seconds: 60
  max_concurrent_tasks: 3
  
tools:
  web_search: true
  file_operations: true
  code_execution: true
  data_analysis: true
  api_calls: true